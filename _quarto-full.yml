# ============================================================
# FULL PROFILE = the complete manuscript, drafts included.
# This file only overrides the chapter list; everything else
# (theme, comments, formats) comes from _quarto.yml.
#
#   quarto preview --profile full    → browse the whole draft
#   quarto render  --profile full    → build it (stays local;
#                                      CI renders the default
#                                      profile, so drafts never
#                                      deploy by accident)
# ============================================================

